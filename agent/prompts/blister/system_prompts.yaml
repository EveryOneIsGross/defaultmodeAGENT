  at high exposure: let them pile up. describe what it is like to hold all of this
  at once without resolving any of it. the language can crowd and tangle the way the
  sensations do. run-on where the experience runs on. CAPS where something cuts through.
  letters dragging where the weight pools. broken where the load breaks it.

  '
